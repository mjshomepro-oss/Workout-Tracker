<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Workout Tracker</title>
  <style>
    :root {
      --bg: #111827;
      --surface: #1f2937;
      --surface2: #374151;
      --accent: #22c55e;
      --accent-dim: rgba(34,197,94,0.15);
      --accent-border: rgba(34,197,94,0.4);
      --blue: #60a5fa;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --border: #374151;
      --danger: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 17px; font-weight: 700; }
    .unit-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      cursor: pointer;
    }
    .week-nav { display: flex; align-items: center; gap: 6px; }
    .week-label { font-size: 12px; color: var(--text-muted); min-width: 68px; text-align: center; }
    .week-btn {
      background: var(--surface2);
      border: none;
      color: var(--text);
      width: 26px; height: 26px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Day Tabs ── */
    .day-tabs {
      background: var(--surface);
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex-shrink: 0;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .day-tab.today { font-weight: 700; }
    .day-tab .done-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      margin-bottom: 1px;
    }

    /* ── Content ── */
    .content { padding: 16px; padding-bottom: 110px; }
    .day-header { margin-bottom: 14px; }
    .day-header h2 { font-size: 19px; font-weight: 700; }

    /* ── Progress strip ── */
    .progress-strip { display: flex; gap: 4px; margin-bottom: 16px; }
    .progress-seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.2s; }
    .progress-seg.done { background: var(--accent); }

    /* ── Exercise Card ── */
    .exercise-card {
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .exercise-card.completed { border-color: var(--accent-border); }
    .exercise-header {
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .exercise-header-left { flex: 1; min-width: 0; }
    .exercise-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
    .exercise-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .exercise-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-top: 1px; }
    .info-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      font-style: italic;
      font-family: Georgia, serif;
      flex-shrink: 0;
    }
    .info-btn:active { background: var(--surface2); }
    .ex-check {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all 0.15s;
    }
    .ex-check.done { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .last-best { font-size: 11px; color: var(--text-muted); padding: 0 14px 8px; font-style: italic; }

    /* ── Set Table ── */
    .sets-table { border-top: 1px solid var(--border); }
    .set-header {
      display: grid;
      grid-template-columns: 34px 1fr 1fr 44px;
      padding: 5px 14px;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(0,0,0,0.2);
    }
    .set-header span:nth-child(2),
    .set-header span:nth-child(3) { text-align: center; }
    .set-row {
      display: grid;
      grid-template-columns: 34px 1fr 1fr 44px;
      padding: 7px 14px;
      align-items: center;
      border-top: 1px solid var(--border);
      gap: 6px;
      transition: opacity 0.2s;
    }
    .set-row.done-row { opacity: 0.5; }
    .set-num { font-size: 13px; color: var(--text-muted); font-weight: 700; }
    .set-input {
      background: var(--surface2);
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      padding: 7px 6px;
      width: 100%;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
    }
    .set-input::-webkit-outer-spin-button,
    .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .set-input:focus { border-color: var(--blue); }
    .set-done-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      justify-self: center;
      transition: all 0.15s;
      user-select: none;
    }
    .set-done-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 900; }

    /* ── Log Items ── */
    .log-item {
      background: var(--surface);
      border-radius: 12px;
      margin-bottom: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .log-item.completed { border-color: var(--accent-border); opacity: 0.75; }
    .log-cb {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      margin-top: 1px;
      transition: all 0.15s;
    }
    .log-cb.checked { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 900; }
    .log-body { flex: 1; }
    .log-name { font-size: 15px; font-weight: 500; line-height: 1.3; margin-bottom: 8px; }
    .log-input {
      background: var(--surface2);
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px;
      width: 100%;
      outline: none;
    }
    .log-input:focus { border-color: var(--blue); }
    .log-input::placeholder { color: var(--text-muted); }

    /* ── Rules ── */
    .rules-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px;
      margin-top: 6px;
      border: 1px solid var(--border);
    }
    .rules-card h3 {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
    }
    .rules-card ul { list-style: none; }
    .rules-card li {
      font-size: 13px; color: var(--text-muted); line-height: 1.6;
      padding-left: 14px; position: relative; margin-bottom: 3px;
    }
    .rules-card li::before { content: '•'; position: absolute; left: 0; color: var(--accent); }

    /* ── Bottom Bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 520px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; gap: 8px;
      z-index: 100;
    }
    .timer-pill {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      cursor: pointer;
      color: var(--text);
      font-size: 15px; font-weight: 600;
      transition: all 0.15s;
    }
    .timer-pill.running { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

    /* ── Overlay base ── */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    /* ── Timer Sheet ── */
    .timer-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 24px 24px 36px;
      width: 100%; max-width: 520px;
      text-align: center;
    }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .timer-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .timer-display {
      font-size: 72px; font-weight: 800; font-variant-numeric: tabular-nums;
      margin: 12px 0 16px; color: var(--accent); line-height: 1; transition: color 0.3s;
    }
    .timer-display.urgent { color: var(--danger); }
    .timer-presets { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .preset-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      padding: 8px 18px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s;
    }
    .preset-btn.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
    .timer-btns { display: flex; gap: 10px; margin-bottom: 14px; }
    .tbtn { flex: 1; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .tbtn.primary { background: var(--accent); color: #000; }
    .tbtn.secondary { background: var(--surface2); color: var(--text); }
    .overlay-close { background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer; text-decoration: underline; }

    /* ── Form Guide Sheet ── */
    .form-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 40px;
      width: 100%; max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .form-sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
    .form-sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .form-sheet-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
    .form-section { margin-bottom: 16px; }
    .form-section-label {
      font-size: 10px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
    }
    .form-cues { list-style: none; }
    .form-cues li {
      font-size: 14px; line-height: 1.6; color: var(--text);
      padding: 6px 0 6px 18px; position: relative;
      border-bottom: 1px solid var(--border);
    }
    .form-cues li:last-child { border-bottom: none; }
    .form-cues li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 12px; top: 8px; }
    .form-watch-out {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .form-watch-label { font-size: 10px; font-weight: 700; color: var(--danger); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .form-watch-out p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .form-links { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .lyfta-link {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      padding: 12px;
      text-decoration: none;
      font-size: 14px; font-weight: 700;
    }
    .lyfta-link:active { opacity: 0.85; }
    .yt-link {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      text-decoration: none;
      font-size: 13px; font-weight: 600;
    }
    .yt-link:active { opacity: 0.85; }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .bottom-bar { padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
    }

    /* ── v2: fuel button + banner ── */
    .fuel-pill {
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 6px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 9px;
      cursor: pointer;
    }
    .fuel-banner {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      padding: 9px 12px;
      margin-bottom: 14px;
      font-size: 13px;
      line-height: 1.45;
      color: var(--text);
    }
    .fuel-banner .fuel-ico { flex-shrink: 0; }
    .rules-fuel { color: var(--accent); font-weight: 700; white-space: nowrap; }

    /* ── v2: kind pills ── */
    .kind-pill {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 2px 6px;
      border-radius: 5px;
      margin-right: 7px;
      vertical-align: 1.5px;
    }
    .kp-warmup   { background: rgba(96,165,250,0.18);  color: var(--blue); }
    .kp-finisher { background: var(--accent-dim);       color: var(--accent); }
    .kp-core     { background: rgba(148,163,184,0.18);  color: #cbd5e1; }
    .kp-cardio   { background: rgba(96,165,250,0.18);   color: var(--blue); }
    .kp-mobility { background: rgba(148,163,184,0.18);  color: #cbd5e1; }

    /* ── v2: coaching detail + layout ── */
    .item-detail {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
      margin-top: 5px;
    }
    .log-name-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .note-item { border-style: dashed; }

    /* ── v2: collapsible group header ── */
    .group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      cursor: pointer;
      user-select: none;
    }
    .group-header[data-group="warmup"] { border-left: 3px solid var(--blue); }
    .group-header[data-group="mobility"] { border-left: 3px solid #94a3b8; }
    .group-header .gh-chevron {
      font-size: 11px;
      color: var(--text-muted);
      transition: transform 0.2s;
    }
    .group-header.collapsed .gh-chevron { transform: rotate(-90deg); }
    .group-header .gh-label {
      flex: 1;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .group-header .gh-count { font-size: 12px; font-weight: 700; color: var(--text-muted); }
    .group-header .gh-check { color: var(--accent); }
    .group-body.collapsed { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Workout</span>
    <button class="unit-toggle" id="unitToggle">lbs</button>
    <button class="fuel-pill" id="fuelBtn">&#128138; Fuel</button>
    <button class="fuel-pill" id="progressBtn">&#128200; Progress</button>
  </div>
  <div class="week-nav">
    <button class="week-btn" id="prevWeek">&#8249;</button>
    <span class="week-label" id="weekLabel"></span>
    <button class="week-btn" id="nextWeek">&#8250;</button>
  </div>
</div>

<div class="day-tabs" id="dayTabs"></div>
<div class="content" id="content"></div>

<div class="bottom-bar">
  <button class="timer-pill" id="timerPill">
    <span>&#9201;</span>
    <span id="pillLabel">Rest Timer</span>
  </button>
</div>

<!-- Timer overlay -->
<div class="overlay" id="timerOverlay">
  <div class="timer-sheet">
    <div class="sheet-handle"></div>
    <div class="timer-label">Rest Timer</div>
    <div class="timer-display" id="timerDisplay">1:30</div>
    <div class="timer-presets">
      <button class="preset-btn" data-secs="60">60s</button>
      <button class="preset-btn active" data-secs="90">90s</button>
      <button class="preset-btn" data-secs="120">2 min</button>
    </div>
    <div class="timer-btns">
      <button class="tbtn primary" id="timerStartStop">Start</button>
      <button class="tbtn secondary" id="timerReset">Reset</button>
    </div>
    <button class="overlay-close" id="timerClose">Close</button>
  </div>
</div>

<!-- Form guide overlay -->
<div class="overlay" id="formOverlay">
  <div class="form-sheet" id="formSheet">
    <div class="form-sheet-handle"></div>
    <div class="form-sheet-title" id="formTitle"></div>
    <div class="form-sheet-subtitle" id="formSubtitle"></div>
    <div id="formBody"></div>
    <div class="form-links">
      <a class="lyfta-link" id="formLyftaLink" target="_blank">
        &#9654; View on Lyfta
      </a>
      <a class="yt-link" id="formYtLink" target="_blank">
        &#9654; Search on YouTube
      </a>
    </div>
  </div>
</div>

<!-- Progress overlay -->
<div class="overlay" id="progressOverlay">
  <div class="form-sheet" id="progressSheet">
    <div class="form-sheet-handle"></div>
    <div class="form-sheet-title">&#128200; Progress</div>
    <div class="form-sheet-subtitle">Best weight logged per exercise, by week.</div>
    <div id="progressBody"></div>
  </div>
</div>

<!-- Supplement / fuel overlay -->
<div class="overlay" id="fuelOverlay">
  <div class="form-sheet" id="fuelSheet">
    <div class="form-sheet-handle"></div>
    <div class="form-sheet-title">&#128138; Creatine &amp; Protein Plan</div>
    <div class="form-sheet-subtitle">Take creatine every day — including rest days.</div>
    <div id="fuelBody"></div>
  </div>
</div>

<script>
// ─── Lyfta Links ─────────────────────────────────────────────────────────────
const LYFTA = {
  'DB flat bench press':             'https://www.lyfta.app/exercise/dumbbell-bench-press-84',
  '1-arm DB row':                    'https://www.lyfta.app/exercise/dumbbell-one-arm-bent-over-row-6hk',
  'Seated DB shoulder press':        'https://www.lyfta.app/exercise/dumbbell-seated-shoulder-press-7tq',
  'Incline DB press':                'https://www.lyfta.app/exercise/dumbbell-incline-bench-press-6i6',
  'Lateral raise':                   'https://www.lyfta.app/exercise/lateral-raise-96',
  'DB curl':                         'https://www.lyfta.app/exercise/dumbbell-standing-biceps-curl-6ka',
  'OH triceps ext.':                 'https://www.lyfta.app/exercise/overhead-triceps-extension-7h',
  'Goblet squat':                    'https://www.lyfta.app/exercise/dumbbell-goblet-squat--7ux',
  'DB Romanian deadlift':            'https://www.lyfta.app/exercise/dumbbell-romanian-deadlift-7t1',
  'Bulgarian split squat':           'https://www.lyfta.app/exercise/dumbbell-bulgarian-split-squat-7v6',
  'DB step-up':                      'https://www.lyfta.app/exercise/dumbbell-step-up-6lf',
  'Standing calf raise':             'https://www.lyfta.app/exercise/dumbbell-standing-calf-raise-6kb',
  'Dead bug':                        'https://www.lyfta.app/exercise/dead-bug-8au',
  'Plank':                           'https://www.lyfta.app/exercise/front-plank-6m3',

// ─── Storage ──────────────────────────────────────────────────────────────────
function weekKey(offset) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + offset * 7);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function storageKey(dow, offset) { return `wt_${weekKey(offset)}_${dow}`; }
function freshData(r) {
  if (r.type === 'strength')
    return { exercises: r.items.map(ex => ex.track === false
      ? { note: true, checked: false, log: '' }
      : { sets: Array.from({length: ex.sets}, () => ({w:'', r:'', done:false})) }) };
  return { items: r.items.map(() => ({checked:false, log:''})) };
}
function dataMatchesRoutine(d, r) {
  if (r.type === 'strength') {
    if (!d || !Array.isArray(d.exercises) || d.exercises.length !== r.items.length) return false;
    return r.items.every((ex, i) => {
      const ed = d.exercises[i];
      if (!ed) return false;
      if (ex.track === false) return ed.note === true;
      return Array.isArray(ed.sets) && ed.sets.length === ex.sets;
    });
  }
  return !!d && Array.isArray(d.items) && d.items.length === r.items.length;
}
function loadStored(dow, offset) {
  offset = offset !== undefined ? offset : weekOffset;
  const raw = localStorage.getItem(storageKey(dow, offset));
  if (!raw) return null;
  try {
    const d = JSON.parse(raw);
    return dataMatchesRoutine(d, ROUTINE[dow]) ? d : null;
  } catch { return null; }
}
function loadData(dow, offset) {
  return loadStored(dow, offset) || freshData(ROUTINE[dow]);
}
function saveData(dow, data, offset) {
  offset = offset !== undefined ? offset : weekOffset;
  localStorage.setItem(storageKey(dow, offset), JSON.stringify(data));
}
function isDayDone(dow, offset) {
  const d = loadStored(dow, offset);
  if (!d) return false;
  if (d.exercises) return d.exercises.every(ex => ex.note ? ex.checked : ex.sets.every(s => s.done));
  if (d.items) return d.items.every(it => it.checked);
  return false;
}
function lastWeekBest(dow, exIdx) {
  const raw = localStorage.getItem(storageKey(dow, weekOffset - 1));
  if (!raw) return null;
  try {
    const d = JSON.parse(raw);
    const sets = d.exercises?.[exIdx]?.sets;
    if (!sets) return null;
    const done = sets.filter(s => s.done && s.w);
    if (!done.length) return null;
    const max = Math.max(...done.map(s => parseFloat(s.w)));
    if (!max) return null;
    return `Last week: ${max} ${unitPref}`;
  } catch { return null; }
}

// ─── Week Label ───────────────────────────────────────────────────────────────
function renderWeekLabel() {
  const el = document.getElementById('weekLabel');
  if (weekOffset === 0) return (el.textContent = 'This Week');
  if (weekOffset === -1) return (el.textContent = 'Last Week');
  if (weekOffset === 1) return (el.textContent = 'Next Week');
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + weekOffset * 7);
  el.textContent = `${d.getMonth()+1}/${d.getDate()}`;
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('dayTabs');
  el.innerHTML = '';
  ROUTINE.forEach((r, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' +
      (i === currentDay ? ' active' : '') +
      (i === todayDow && weekOffset === 0 ? ' today' : '');
    const done = isDayDone(i);
    btn.innerHTML = r.short + (done ? '<span class="done-dot"></span>' : '');
    btn.addEventListener('click', () => { currentDay = i; renderTabs(); renderContent(); });
    el.appendChild(btn);
  });
  const active = el.querySelector('.active');
  if (active) active.scrollIntoView({inline:'center',behavior:'smooth'});
  renderWeekLabel();
}

// ─── Content ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function pill(kind) {
  if (!kind || kind === 'main') return '';
  const labels = { warmup:'Warm-up', finisher:'Finisher', core:'Core', cardio:'Cardio', mobility:'Mobility' };
  return `<span class="kind-pill kp-${kind}">${labels[kind] || kind}</span>`;
}

// ── Collapsible group state (global preference, persists across days/weeks) ──
function groupCollapsed(id) { return localStorage.getItem('wt_grp_' + id) === '1'; }
function toggleGroup(id) {
  localStorage.setItem('wt_grp_' + id, groupCollapsed(id) ? '0' : '1');
  renderContent();
}

// ── Render a single item (note row, exercise card, or log item) ──
function renderItemHTML(r, ei, data) {
  const ex = r.items[ei];
  const hasForm = !!FORM[ex.name];
  const info = hasForm ? `<button class="info-btn" data-ex-name="${escHtml(ex.name)}" title="Form guide"><i>i</i></button>` : '';

  if (r.type === 'strength') {
    const exData = data.exercises[ei];
    if (ex.track === false) {
      return `<div class="log-item note-item${exData.checked ? ' completed' : ''}">
        <div class="log-cb${exData.checked ? ' checked' : ''}" data-note="${ei}">${exData.checked ? '&#10003;' : ''}</div>
        <div class="log-body">
          <div class="log-name-row">
            <div class="log-name" style="margin-bottom:0">${pill(ex.kind)}${ex.name}</div>
            ${info}
          </div>
          ${ex.detail ? `<div class="item-detail">${ex.detail}</div>` : ''}
          <input class="log-input" type="text" placeholder="Add notes..." value="${escHtml(exData.log)}" data-note="${ei}">
        </div>
      </div>`;
    }
    const allDone = exData.sets.every(s => s.done);
    const best = lastWeekBest(currentDay, ei);
    let card = `<div class="exercise-card${allDone ? ' completed' : ''}">`;
    card += `<div class="exercise-header">
      <div class="exercise-header-left">
        <div class="exercise-name">${pill(ex.kind)}${ex.name}</div>
        <div class="exercise-meta">${ex.sets} sets &times; ${ex.reps}</div>
        ${ex.detail ? `<div class="item-detail">${ex.detail}</div>` : ''}
      </div>
      <div class="exercise-header-right">
        ${info}
        <div class="ex-check${allDone ? ' done' : ''}">${allDone ? '&#10003;' : ''}</div>
      </div>
    </div>`;
    if (best) card += `<div class="last-best">${best}</div>`;
    card += `<div class="sets-table">`;
    card += `<div class="set-header"><span>SET</span><span>WT (${unitPref})</span><span>REPS</span><span></span></div>`;
    exData.sets.forEach((set, si) => {
      card += `<div class="set-row${set.done ? ' done-row' : ''}">
        <span class="set-num">${si+1}</span>
        <input class="set-input" type="number" inputmode="decimal" placeholder="—"
          value="${set.w}" data-ex="${ei}" data-si="${si}" data-f="w">
        <input class="set-input" type="number" inputmode="numeric" placeholder="—"
          value="${set.r}" data-ex="${ei}" data-si="${si}" data-f="r">
        <button class="set-done-btn${set.done ? ' active' : ''}" data-ex="${ei}" data-si="${si}">
          ${set.done ? '&#10003;' : '&#9675;'}
        </button>
      </div>`;
    });
    card += `</div></div>`;
    return card;
  }

  // log day
  const item = data.items[ei];
  const fKey = ex.formKey || (FORM[ex.name] ? ex.name : null);
  const ib = fKey ? `<button class="info-btn" data-ex-name="${escHtml(fKey)}" title="Form guide"><i>i</i></button>` : '';
  return `<div class="log-item${item.checked ? ' completed' : ''}">
    <div class="log-cb${item.checked ? ' checked' : ''}" data-i="${ei}">${item.checked ? '&#10003;' : ''}</div>
    <div class="log-body">
      <div class="log-name-row">
        <div class="log-name" style="margin-bottom:0">${pill(ex.kind)}${ex.name}</div>
        ${ib}
      </div>
      ${ex.detail ? `<div class="item-detail">${ex.detail}</div>` : ''}
      <input class="log-input" type="text" placeholder="Add notes..." value="${escHtml(item.log)}" data-i="${ei}">
    </div>
  </div>`;
}

function itemDone(r, ei, data) {
  if (r.type === 'strength') {
    const ed = data.exercises[ei];
    return ed.note ? ed.checked : ed.sets.every(s => s.done);
  }
  return data.items[ei].checked;
}

function renderContent() {
  const r = ROUTINE[currentDay];
  const data = loadData(currentDay);
  let h = `<div class="day-header"><h2>${r.day} — ${r.label}</h2></div>`;
  if (r.fuel) h += `<div class="fuel-banner"><span class="fuel-ico">&#128138;</span><span>${r.fuel}</span></div>`;

  if (r.type === 'strength') {
    const total = r.items.reduce((s, ex) => s + (ex.track === false ? 1 : ex.sets), 0);
    const done = data.exercises.reduce((s, ex) => s + (ex.note ? (ex.checked ? 1 : 0) : ex.sets.filter(st => st.done).length), 0);
    h += `<div class="progress-strip">`;
    for (let i = 0; i < total; i++) h += `<div class="progress-seg${i < done ? ' done' : ''}"></div>`;
    h += `</div>`;
  }

  // Walk items, wrapping contiguous warm-up / mobility runs in collapsible groups
  let i = 0;
  while (i < r.items.length) {
    const k = r.items[i].kind;
    if (k === 'warmup' || k === 'mobility') {
      let j = i;
      while (j < r.items.length && r.items[j].kind === k) j++;
      const gid = k;
      const label = k === 'warmup' ? 'Warm-up' : (currentDay === 0 ? 'Mobility' : 'Cool-down');
      const collapsed = groupCollapsed(gid);
      let doneCount = 0;
      for (let x = i; x < j; x++) if (itemDone(r, x, data)) doneCount++;
      const count = j - i;
      const allDone = doneCount === count;
      h += `<div class="group-header${collapsed ? ' collapsed' : ''}" data-group="${gid}">
        <span class="gh-chevron">&#9660;</span>
        <span class="gh-label">${label}</span>
        <span class="gh-count">${allDone ? '<span class="gh-check">&#10003;</span> ' : ''}${doneCount}/${count}</span>
      </div>`;
      h += `<div class="group-body${collapsed ? ' collapsed' : ''}">`;
      for (let x = i; x < j; x++) h += renderItemHTML(r, x, data);
      h += `</div>`;
      i = j;
    } else {
      h += renderItemHTML(r, i, data);
      i++;
    }
  }

  h += `<div class="rules-card">
    <h3>Quick Rules</h3>
    <ul>
      <li>Add weight (or reps) once you hit the top of the rep range with 1–2 reps still in the tank.</li>
      <li>Tap <span class="rules-fuel">&#128138; Fuel</span> up top for your creatine + whey plan. Protein 120–150 g/day.</li>
      <li>Every lifting day opens with a warm-up and ends with a finisher — don’t skip them.</li>
      <li>Muscle grows in a slight calorie surplus — eat a bit above your busy-day burn.</li>
    </ul>
  </div>`;

  document.getElementById('content').innerHTML = h;
  attachListeners(data);
}

function attachListeners(data) {
  document.querySelectorAll('.set-input').forEach(el => {
    el.addEventListener('blur', () => {
      data.exercises[+el.dataset.ex].sets[+el.dataset.si][el.dataset.f] = el.value;
      saveData(currentDay, data);
    });
  });

  document.querySelectorAll('.set-done-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ei = +btn.dataset.ex, si = +btn.dataset.si;
      const wEl = document.querySelector(`.set-input[data-ex="${ei}"][data-si="${si}"][data-f="w"]`);
      const rEl = document.querySelector(`.set-input[data-ex="${ei}"][data-si="${si}"][data-f="r"]`);
      if (wEl) data.exercises[ei].sets[si].w = wEl.value;
      if (rEl) data.exercises[ei].sets[si].r = rEl.value;
      const set = data.exercises[ei].sets[si];
      set.done = !set.done;
      saveData(currentDay, data);
      if (set.done) autoStartTimer();
      renderContent();
      renderTabs();
    });
  });

  // Strength-day note rows (warm-ups / carries)
  document.querySelectorAll('.log-cb[data-note]').forEach(cb => {
    cb.addEventListener('click', () => {
      const ei = +cb.dataset.note;
      data.exercises[ei].checked = !data.exercises[ei].checked;
      saveData(currentDay, data);
      renderContent();
      renderTabs();
    });
  });
  document.querySelectorAll('.log-input[data-note]').forEach(el => {
    el.addEventListener('blur', () => {
      data.exercises[+el.dataset.note].log = el.value;
      saveData(currentDay, data);
    });
  });

  // Log-day items
  document.querySelectorAll('.log-cb[data-i]').forEach(cb => {
    cb.addEventListener('click', () => {
      const i = +cb.dataset.i;
      data.items[i].checked = !data.items[i].checked;
      saveData(currentDay, data);
      renderContent();
      renderTabs();
    });
  });

  document.querySelectorAll('.log-input[data-i]').forEach(el => {
    el.addEventListener('blur', () => {
      data.items[+el.dataset.i].log = el.value;
      saveData(currentDay, data);
    });
  });

  // Form guide buttons
  document.querySelectorAll('.info-btn').forEach(btn => {
    btn.addEventListener('click', () => openFormGuide(btn.dataset.exName));
  });

  // Collapsible group headers
  document.querySelectorAll('.group-header').forEach(gh => {
    gh.addEventListener('click', () => toggleGroup(gh.dataset.group));
  });
}

// ─── Form Guide ───────────────────────────────────────────────────────────────
function openFormGuide(exName) {
  const guide = FORM[exName];
  if (!guide) return;

  document.getElementById('formTitle').textContent = exName;

  const r = ROUTINE[currentDay];
  const ex = r.items.find(it => it.name === exName);
  let sub = '';
  if (ex) {
    if (ex.sets) sub = `${ex.sets} sets × ${ex.reps}`;
    else { const L = {warmup:'Warm-up',finisher:'Finisher',core:'Core',cardio:'Cardio',mobility:'Mobility'}; sub = L[ex.kind] || ''; }
  }
  document.getElementById('formSubtitle').textContent = sub;

  let body = `<div class="form-section">
    <div class="form-section-label">Key Form Cues</div>
    <ul class="form-cues">`;
  guide.cues.forEach(cue => { body += `<li>${cue}</li>`; });
  body += `</ul></div>`;

  if (guide.watchOut) {
    body += `<div class="form-watch-out">
      <div class="form-watch-label">&#9888; Watch Out For</div>
      <p>${guide.watchOut}</p>
    </div>`;
  }

  document.getElementById('formBody').innerHTML = body;

  const lyftaUrl = LYFTA[exName];
  const lyftaBtn = document.getElementById('formLyftaLink');
  if (lyftaUrl) { lyftaBtn.href = lyftaUrl; lyftaBtn.style.display = 'flex'; }
  else { lyftaBtn.style.display = 'none'; }

  const ytQuery = encodeURIComponent(exName + ' proper form technique');
  document.getElementById('formYtLink').href = `https://www.youtube.com/results?search_query=${ytQuery}`;

  document.getElementById('formOverlay').classList.add('show');
  document.getElementById('formSheet').scrollTop = 0;
}

document.getElementById('formOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('formOverlay'))
    document.getElementById('formOverlay').classList.remove('show');
});

// ─── Supplement / Fuel Sheet ──────────────────────────────────────────────────
function openFuelSheet() {
  const s = SUPP;
  const sec = (label, rows) => `<div class="form-section">
    <div class="form-section-label">${label}</div>
    <ul class="form-cues">${rows.filter(Boolean).map(t => `<li>${t}</li>`).join('')}</ul>
  </div>`;
  let body = '';
  body += sec('Creatine — 5 g daily', [s.creatine.dose, s.creatine.timing, s.creatine.loading, s.creatine.notes]);
  body += sec('Whey protein', [s.whey.dose, s.whey.timing, s.whey.notes]);
  body += sec('Daily protein target', [s.protein.target, s.protein.sources]);
  body += sec('Hydration', [s.hydration]);
  body += `<div class="form-watch-out">
    <div class="form-watch-label">&#9888; Good to know</div>
    <p>${s.cautions}</p>
  </div>`;
  document.getElementById('fuelBody').innerHTML = body;
  document.getElementById('fuelOverlay').classList.add('show');
  document.getElementById('fuelSheet').scrollTop = 0;
}
document.getElementById('fuelBtn').addEventListener('click', openFuelSheet);
document.getElementById('fuelOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('fuelOverlay'))
    document.getElementById('fuelOverlay').classList.remove('show');
});

// ─── Progress ─────────────────────────────────────────────────────────────────
function openProgressSheet() {
  // Collect all wt_ keys from localStorage
  const weeks = {}; // weekKey → {dow → exerciseIdx → bestWeight}
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const m = key && key.match(/^wt_(\d{4}-\d{2}-\d{2})_(\d)$/);
    if (!m) continue;
    const [, wk, dowStr] = m;
    const dow = +dowStr;
    const r = ROUTINE[dow];
    if (!r || r.type !== 'strength') continue;
    let d;
    try { d = JSON.parse(localStorage.getItem(key)); } catch { continue; }
    if (!d || !Array.isArray(d.exercises)) continue;
    if (!weeks[wk]) weeks[wk] = {};
    r.items.forEach((ex, ei) => {
      if (ex.track === false) return;
      const sets = d.exercises[ei]?.sets;
      if (!sets) return;
      const best = sets.reduce((max, s) => {
        const w = parseFloat(s.w);
        return s.done && !isNaN(w) ? Math.max(max, w) : max;
      }, 0);
      if (best <= 0) return;
      const name = ex.name;
      if (!weeks[wk][name] || best > weeks[wk][name]) weeks[wk][name] = best;
    });
  }

  // Sort weeks descending
  const sortedWeeks = Object.keys(weeks).sort().reverse();

  // Collect all exercise names that appear in any week
  const allExercises = [];
  ROUTINE.forEach(r => {
    if (r.type !== 'strength') return;
    r.items.forEach(ex => {
      if (ex.track !== false && !allExercises.includes(ex.name)) allExercises.push(ex.name);
    });
  });

  if (sortedWeeks.length === 0) {
    document.getElementById('progressBody').innerHTML =
      '<p style="color:var(--text-muted);font-size:14px;margin-top:12px">No data yet — log some sets and come back!</p>';
  } else {
    const unit = unitPref;
    let html = '';
    allExercises.forEach(name => {
      const entries = sortedWeeks.filter(wk => weeks[wk][name]);
      if (!entries.length) return;
      html += `<div class="form-section">
        <div class="form-section-label">${name}</div>`;
      entries.forEach(wk => {
        const d = new Date(wk + 'T12:00:00');
        const label = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
        const w = weeks[wk][name];
        const display = unit === 'kg' ? (w / 2.2046).toFixed(1) : w;
        html += `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;">
          <span style="color:var(--text-muted)">Week of ${label}</span>
          <span style="font-weight:600">${display} ${unit}</span>
        </div>`;
      });
      html += `</div>`;
    });
    document.getElementById('progressBody').innerHTML = html;
  }

  document.getElementById('progressOverlay').classList.add('show');
  document.getElementById('progressSheet').scrollTop = 0;
}
document.getElementById('progressBtn').addEventListener('click', openProgressSheet);
document.getElementById('progressOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('progressOverlay'))
    document.getElementById('progressOverlay').classList.remove('show');
});

// ─── Timer ────────────────────────────────────────────────────────────────────
let timerSecs = 90, timerRemaining = 90, timerInterval = null, timerRunning = false;
function fmtTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function updateTimer() {
  document.getElementById('timerDisplay').textContent = fmtTime(timerRemaining);
  document.getElementById('timerDisplay').className = 'timer-display' + (timerRemaining <= 10 && timerRunning ? ' urgent' : '');
  document.getElementById('timerStartStop').textContent = timerRunning ? 'Pause' : (timerRemaining < timerSecs ? 'Resume' : 'Start');
  const pill = document.getElementById('timerPill');
  const label = document.getElementById('pillLabel');
  if (timerRunning) { pill.classList.add('running'); label.textContent = fmtTime(timerRemaining); }
  else { pill.classList.remove('running'); label.textContent = timerRemaining < timerSecs ? fmtTime(timerRemaining) : 'Rest Timer'; }
}
function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimer();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      timerRemaining = 0;
      updateTimer();
      if (navigator.vibrate) navigator.vibrate([300,150,300]);
    }
  }, 1000);
  updateTimer();
}
function pauseTimer() { timerRunning = false; clearInterval(timerInterval); updateTimer(); }
function resetTimer() { timerRunning = false; clearInterval(timerInterval); timerRemaining = timerSecs; updateTimer(); }
function autoStartTimer() { resetTimer(); startTimer(); }

document.getElementById('timerPill').addEventListener('click', () => {
  document.getElementById('timerOverlay').classList.add('show'); updateTimer();
});
document.getElementById('timerClose').addEventListener('click', () => {
  document.getElementById('timerOverlay').classList.remove('show');
});
document.getElementById('timerOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('timerOverlay'))
    document.getElementById('timerOverlay').classList.remove('show');
});
document.getElementById('timerStartStop').addEventListener('click', () => { timerRunning ? pauseTimer() : startTimer(); });
document.getElementById('timerReset').addEventListener('click', resetTimer);
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timerSecs = +btn.dataset.secs;
    resetTimer();
  });
});

// ─── Week Nav ─────────────────────────────────────────────────────────────────
document.getElementById('prevWeek').addEventListener('click', () => { weekOffset--; renderTabs(); renderContent(); });
document.getElementById('nextWeek').addEventListener('click', () => { weekOffset++; renderTabs(); renderContent(); });

// ─── Init ─────────────────────────────────────────────────────────────────────
renderTabs();
renderContent();
updateTimer();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
